name: Auto Release Notes
on:
  push:
    branches: [main, master]
  pull_request:
    types: [opened, reopened, synchronize]
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: release-drafter/release-drafter@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
