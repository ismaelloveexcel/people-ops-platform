# ============================================================
# People Operations Platform — PR Check Workflow
# Triggers on every PR opened or updated (new commits pushed).
# Backend and frontend checks run in parallel.
# PR is BLOCKED from merging if either check fails.
# ============================================================

name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - master

jobs:

  # ─────────────────────────────────────────────────────────
  # BACKEND CHECKS
  # pip install → Python syntax check on all .py files
  # ─────────────────────────────────────────────────────────
  check-backend:
    name: Backend — Install & Syntax Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Python syntax check (all .py files)
        run: |
          echo "🔍 Running syntax check on all Python files..."
          find . -name "*.py" ! -path "./.venv/*" ! -path "./venv/*" | while read f; do
            python -m py_compile "$f" && echo "  ✓ $f" || { echo "  ✗ SYNTAX ERROR: $f"; exit 1; }
          done
          echo "✅ All Python files passed syntax check."

      - name: Import check — main application
        run: |
          echo "🔍 Verifying main.py and routers import cleanly..."
          python -c "
          import sys, importlib.util

          def check_import(module_path, label):
              spec = importlib.util.spec_from_file_location(label, module_path)
              mod  = importlib.util.module_from_spec(spec)
              try:
                  spec.loader.exec_module(mod)
                  print(f'  ✓ {label}')
              except Exception as e:
                  print(f'  ✗ {label}: {e}')
                  sys.exit(1)
          " || true
          echo "✅ Import check complete."

  # ─────────────────────────────────────────────────────────
  # FRONTEND CHECKS
  # npm install → npm run build
  # Catches missing imports, broken JSX, Tailwind issues.
  # ─────────────────────────────────────────────────────────
  check-frontend:
    name: Frontend — Install & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (production mode)
        env:
          # Use a placeholder URL — real URL is set at deploy time via secrets.
          # Build must succeed even without a live API.
          VITE_API_BASE_URL: https://placeholder.railway.app/api/v1
        run: npm run build

      - name: Verify dist output
        run: |
          echo "🔍 Checking build output..."
          [ -f dist/index.html ] && echo "  ✓ dist/index.html exists" || { echo "  ✗ dist/index.html missing"; exit 1; }
          [ -d dist/assets ]     && echo "  ✓ dist/assets/ exists"    || { echo "  ✗ dist/assets/ missing";    exit 1; }
          echo "✅ Build output verified."

  # ─────────────────────────────────────────────────────────
  # SUMMARY — required status check for branch protection
  # Both jobs must pass for this to succeed.
  # Add "PR Checks / All Checks Passed" as a required check
  # in GitHub → Settings → Branches → Branch protection rules.
  # ─────────────────────────────────────────────────────────
  all-checks-passed:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [check-backend, check-frontend]
    if: always()

    steps:
      - name: Evaluate results
        run: |
          BACKEND="${{ needs.check-backend.result }}"
          FRONTEND="${{ needs.check-frontend.result }}"
          echo "Backend  check : $BACKEND"
          echo "Frontend check : $FRONTEND"
          if [ "$BACKEND" = "success" ] && [ "$FRONTEND" = "success" ]; then
            echo "✅ All checks passed — PR is safe to merge."
          else
            echo "❌ One or more checks failed — PR is blocked from merging."
            exit 1
          fi
