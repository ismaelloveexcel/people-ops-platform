name: Close stale issues and PRs
on:
  schedule:
    - cron: "0 9 * * 1"
jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: "This issue has been inactive for 30 days and will be closed soon. Comment to keep it open."
          close-issue-message: "Closed due to inactivity. Reopen anytime."
          days-before-stale: 30
          days-before-close: 7
