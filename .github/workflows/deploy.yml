# ============================================================
# People Operations Platform — Deploy Workflow
# Triggers ONLY when a PR is merged into master.
# Runs Railway (backend) and Vercel (frontend) in parallel.
# ============================================================

name: Deploy to Production

on:
  pull_request:
    types: [closed]        # fires on close; we filter for merged below
    branches:
      - master

# Only proceed when the PR was actually merged (not just closed/abandoned)
jobs:

  # ─────────────────────────────────────────────────────────
  # GUARD: exits immediately if PR was closed without merging
  # ─────────────────────────────────────────────────────────
  check-merged:
    name: Confirm PR was merged
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    steps:
      - name: PR is merged — proceeding to deploy
        run: echo "✅ PR #${{ github.event.pull_request.number }} merged into master. Starting deployment."

  # ─────────────────────────────────────────────────────────
  # BACKEND — Deploy to Railway
  # ─────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend → Railway
    runs-on: ubuntu-latest
    needs: check-merged
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service backend --detach

      - name: Deployment summary
        run: echo "🚂 Backend deployed to Railway successfully."

  # ─────────────────────────────────────────────────────────
  # FRONTEND — Deploy to Vercel
  # ─────────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend → Vercel
    runs-on: ubuntu-latest
    needs: check-merged
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: npm run build

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel (production)
        env:
          VERCEL_TOKEN:   ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID:  ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel --prod --token=$VERCEL_TOKEN --yes

      - name: Deployment summary
        run: echo "▲ Frontend deployed to Vercel successfully."

  # ─────────────────────────────────────────────────────────
  # NOTIFY — summary after both deployments complete
  # ─────────────────────────────────────────────────────────
  notify:
    name: Deployment Complete
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: always()

    steps:
      - name: Report result
        run: |
          BACKEND="${{ needs.deploy-backend.result }}"
          FRONTEND="${{ needs.deploy-frontend.result }}"
          echo "Backend  : $BACKEND"
          echo "Frontend : $FRONTEND"
          if [ "$BACKEND" = "success" ] && [ "$FRONTEND" = "success" ]; then
            echo "✅ Full deployment succeeded."
          else
            echo "❌ One or more deployments failed. Check job logs above."
            exit 1
          fi
